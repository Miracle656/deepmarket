name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC — catches newly published advisories.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit-frontend:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: deepmarket
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: deepmarket/package-lock.json
      - run: npm ci
      - name: Audit (fail on high+)
        run: npm audit --audit-level=high

  npm-audit-bot:
    name: npm audit (bot)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bot/package-lock.json
      - run: npm ci
      - name: Audit (fail on high+)
        run: npm audit --audit-level=high

  cargo-audit-indexer:
    name: cargo audit (indexer)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: indexer
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: indexer
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Audit
        run: cargo audit

  secret-scan:
    name: trufflehog secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  dependency-review:
    name: GitHub dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
